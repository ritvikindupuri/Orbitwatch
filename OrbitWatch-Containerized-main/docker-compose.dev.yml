# ============================================================================
# ORBITWATCH DOCKER COMPOSE - DEVELOPMENT
# ============================================================================
# Uses .env file for credentials instead of Docker Secrets
#
# USAGE:
#   1. Copy .env.example to .env and fill in credentials
#   2. Run: docker-compose -f docker-compose.dev.yml up --build
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # Frontend Service
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: .
      target: frontend
    container_name: orbitwatch-frontend-dev
    ports:
      - "8085:80"
    depends_on:
      relay:
        condition: service_healthy
    networks:
      - orbitwatch-net

  # --------------------------------------------------------------------------
  # Relay Service
  # --------------------------------------------------------------------------
  relay:
    build:
      context: .
      target: relay
    container_name: orbitwatch-relay-dev
    expose:
      - "3001"
    environment:
      - RELAY_PORT=3001
      - NODE_ENV=development
      - ELASTIC_URL=${ELASTIC_URL}
      - ELASTIC_API_KEY=${ELASTIC_API_KEY}
      - SATELLITE_INDEX=${SATELLITE_INDEX:-space-track-satellites}
      - FORENSIC_INDEX=${FORENSIC_INDEX:-sda-intelligence-ledger}
    networks:
      - orbitwatch-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  orbitwatch-net:
    driver: bridge
